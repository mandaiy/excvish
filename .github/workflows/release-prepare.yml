name: release-prepare

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (SemVer, without leading "v")
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Normalize version input
      id: version
      shell: bash
      run: |
        raw="${{ github.event.inputs.version }}"
        normalized="${raw#v}"
        if [[ ! "$normalized" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $raw"
          exit 1
        fi
        echo "value=$normalized" >> "$GITHUB_OUTPUT"
        echo "tag=v$normalized" >> "$GITHUB_OUTPUT"

    - name: Ensure tag does not already exist
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 1
        fi

    - name: Update pyproject version
      shell: bash
      run: |
        python - <<'PY'
        import pathlib
        import re

        version = "${{ steps.version.outputs.value }}"
        path = pathlib.Path("pyproject.toml")
        text = path.read_text(encoding="utf-8")
        updated, n = re.subn(
            r'(?m)^version = "[^"]+"$',
            f'version = "{version}"',
            text,
            count=1,
        )
        if n != 1:
          raise RuntimeError("failed to update version in pyproject.toml")
        path.write_text(updated, encoding="utf-8")
        PY

    - name: Create release pull request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: release/${{ steps.version.outputs.tag }}
        base: main
        title: "chore(release): prepare ${{ steps.version.outputs.tag }}"
        commit-message: "chore(release): prepare ${{ steps.version.outputs.tag }}"
        body: |
          ## Summary
          - Prepare release `${{ steps.version.outputs.tag }}`.
          - Update `pyproject.toml` version to `${{ steps.version.outputs.value }}`.

          ## Notes
          - This PR is generated by `release-prepare.yml`.
          - After merge, `release-publish.yml` will publish the GitHub Release.
