name: release-publish

on:
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect whether pyproject.toml changed in this push
      id: changed
      shell: bash
      run: |
        before="${{ github.event.before }}"
        after="${{ github.sha }}"
        if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
          echo "value=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if git diff --name-only "$before" "$after" | grep -qx "pyproject.toml"; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Read version from pyproject.toml
      id: version
      shell: bash
      run: |
        version=$(python - <<'PY'
        import tomllib
        with open("pyproject.toml", "rb") as f:
            data = tomllib.load(f)
        print(data["project"]["version"])
        PY
        )
        echo "value=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"

    - name: Check whether release tag already exists
      id: tag
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create release
      if: steps.changed.outputs.value == 'true' && steps.tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        target_commitish: ${{ github.sha }}
        generate_release_notes: true
